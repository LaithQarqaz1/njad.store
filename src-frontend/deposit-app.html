  <!-- تهيئة الثيم مبكرًا (منع اللمعة عند التحميل) -->
  <script>
    (function(){
      var theme = 'dark';
      try{
        var t = localStorage.getItem('theme');
        if(!t){ t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'; }
        theme = (t==='light') ? 'light' : 'dark';
      }catch(e){ theme='dark'; }
      document.documentElement.setAttribute('data-theme', theme);
      try{
        var metaCS=document.querySelector('meta[name="color-scheme"]'); if(!metaCS){ metaCS=document.createElement('meta'); metaCS.name='color-scheme'; document.head.appendChild(metaCS);} metaCS.setAttribute('content', theme==='dark'?'dark light':'light dark');
        var metaTC=document.querySelector('meta[name="theme-color"]'); if(!metaTC){ metaTC=document.createElement('meta'); metaTC.name='theme-color'; document.head.appendChild(metaTC);} metaTC.setAttribute('content', theme==='dark'?'#05050b':'#f9f9f9');
      }catch(e){}
      var s=document.createElement('style'); s.id='critical-theme'; s.textContent='html{background:'+(theme==='dark'?'#05050b':'#f9f9f9')+';color:'+(theme==='dark'?'#f0f1ff':'#333')+'} body{background:inherit;color:inherit;margin:0}'; document.head.appendChild(s);
    })();
  </script>

  <!-- حارس مبكر: منع فتح الصفحة مباشرةً أو إن كانت البطاقة مغلقة -->
  <script>
    (function(){
      try{
        var base = (location.pathname.split('/').pop() || '');
        var page = base.replace(/\.html$/,'');
        var redirectTo = 'index.html';

        // 1) افحص كاش حالات البطاقات (مملوء من الصفحة الرئيسية)
        try{
          var raw = localStorage.getItem('statesCache');
          if (raw){
            var obj = JSON.parse(raw);
            var map = obj && obj.map ? obj.map : null;
            if (map && page && map[page] === 'off'){
              try{ sessionStorage.setItem('nav:reason','closed:'+page); }catch(_){ }
              return window.location.replace(redirectTo);
            }
          }
        }catch(_){/* ignore */}

        // 2) امنع الدخول المباشر (ليس من داخل الموقع)
        var nav = (performance.getEntriesByType && performance.getEntriesByType('navigation')) || [];
        var type = nav[0] ? nav[0].type : (performance.navigation ? (performance.navigation.type === 1 ? 'reload' : (performance.navigation.type === 2 ? 'back_forward' : '')) : '');
        var isReload = type === 'reload';
        var isBF = type === 'back_forward';
        var fromHome = false; try{ fromHome = sessionStorage.getItem('nav:fromHome') === '1'; }catch(_){ }
        var refOk = false; try{ var rr=document.referrer; if(rr){ var uu=new URL(rr); refOk=(uu.origin===location.origin);} }catch(_){ }
        var paramsAllow = false; try{ paramsAllow=(new URLSearchParams(location.search)).has('allow'); }catch(_){ }
        var guardOff = false; try{ guardOff=localStorage.getItem('nav:guardOff')==='1'; }catch(_){ }

        if (!fromHome && !isReload && !isBF && !refOk && !paramsAllow && !guardOff){
          try{ sessionStorage.setItem('nav:redirectedFrom', base); }catch(_){ }
          return window.location.replace(redirectTo);
        }
        if (fromHome){ try{ sessionStorage.removeItem('nav:fromHome'); }catch(_){} }
      }catch(e){ window.location.replace('index.html'); }
    })();
  </script>

    <script>
  (function(){
    function applyCardState(card, state){
      var finalState = (state == null) ? 'on' : state;
      var titleEl = card.querySelector ? card.querySelector('h2') : null;
      var img = card.querySelector ? card.querySelector('img') : null;
      try{ card.classList.remove('loading'); }catch(_){ }
      if (finalState === 'off'){
        if (img){ try{ img.setAttribute('loading','eager'); img.setAttribute('decoding','sync'); img.setAttribute('fetchpriority','high'); }catch(_){ } }
        try{ card.classList.add('maintenance'); card.classList.remove('pending-state'); }catch(_){ }
        try{ card.removeAttribute('href'); }catch(_){ }
        if (titleEl){ try{ titleEl.textContent = '🚧 مغلق للصيانة'; }catch(_){ } }
      } else {
        try{
          if (card.dataset && card.dataset.originalHref){ card.setAttribute('href', card.dataset.originalHref); }
          card.classList.remove('maintenance','pending-state');
          if (titleEl && card.dataset && card.dataset.originalTitle){ titleEl.textContent = card.dataset.originalTitle; }
        }catch(_){ }
      }
    }
    function prepCard(card){
      try{
        if (!card.dataset.originalHref){ var href = card.getAttribute('href'); if (href) card.dataset.originalHref = href; }
        var t = card.querySelector && card.querySelector('h2');
        if (t && !card.dataset.originalTitle){ card.dataset.originalTitle = t.textContent || ''; }
      }catch(_){ }
    }
    function getPageNameFromCard(card){
      try{
        var href = (card.dataset && card.dataset.originalHref) || card.getAttribute('href') || '';
        href = href.split('?')[0].split('#')[0];
        return href.replace(/\.html$/,'');
      }catch(_){ return ''; }
    }
    var STATES_TTL_MS = 5*60*1000;
    var STATES_CACHE_KEY = 'statesCache';
    function saveStatesCache(map){ try{ localStorage.setItem(STATES_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), map: map||{} })); }catch(_){ } }
    function readStatesCache(ignoreTTL){
      try{
        var raw = localStorage.getItem(STATES_CACHE_KEY);
        if(!raw) return null;
        var obj; try{ obj = JSON.parse(raw); }catch(_){ obj=null; }
        if (obj && typeof obj === 'object'){
          if(!ignoreTTL){ var now = Date.now(); if(obj.savedAt && (now-obj.savedAt)>STATES_TTL_MS){ /* expired */ } }
          if (obj.map && typeof obj.map === 'object') return obj.map;
          if (typeof obj.stateJson === 'string'){ try{ var m=JSON.parse(obj.stateJson); if(m && typeof m==='object') return m; }catch(_){ } }
          var vals = Object.values(obj); if (vals.length && vals.every(function(v){return v==='on'||v==='off';})) return obj;
        }
        try{ var m2 = JSON.parse(raw); if (m2 && typeof m2==='object') return m2; }catch(_){ }
        return null;
      }catch(_){ return null; }
    }
    function parseStatesDoc(data){
      var map = {};
      try{
        if (typeof data.stateJson === 'string') { map = JSON.parse(data.stateJson)||{}; }
        else if (data.map && typeof data.map==='object'){ map = data.map; }
        else { map = data||{}; }
      }catch(_){ map = {}; }
      return map;
    }
    async function loadStatesMap(){
      try{
        if (typeof firebase==='undefined' || !firebase.firestore) return null;
        var ref = firebase.firestore().collection('config').doc('states');
        var snap = await ref.get({ source:'server' }).catch(function(){ return ref.get(); });
        if (!snap || !snap.exists) return null;
        var map = parseStatesDoc(snap.data()||{});
        saveStatesCache(map);
        return map;
      }catch(_){ return null; }
    }
    function applyStatesToPage(){
      try{
        var cards = Array.prototype.slice.call(document.querySelectorAll('a.card, .card[href]'));
        if (!cards.length) return;
        cards.forEach(prepCard);
        if (window.__SKIP_FIREBASE__){ try{ cards.forEach(function(card){ try{ card.removeAttribute('href'); card.classList.add('pending-state'); }catch(_){ } }); }catch(_){ } var cached = readStatesCache(true);
          if (cached){ cards.forEach(function(card){ var name=getPageNameFromCard(card); var s=(name && cached.hasOwnProperty(name))? cached[name] : 'on'; applyCardState(card,s); }); }
          return;
        }
        loadStatesMap().then(function(map){ if(!map){ map = readStatesCache(false)||{}; } cards.forEach(function(card){ var name=getPageNameFromCard(card); var s=(name && map && map.hasOwnProperty(name))? map[name] : 'on'; applyCardState(card,s); }); });
      }catch(_){ }
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', applyStatesToPage); else try{ applyStatesToPage(); }catch(_){ }
  })();
  </script>

  <!-- Theme tokens + dark overrides -->
  <style>
    :root {
      --bg:#f8f9fa; --text:#111827; --muted:#6f72a6;
      --card-bg:#f9f9ff; --card-text:var(--text); --card-border:#d9dbff;
      --card-gradient:linear-gradient(160deg, rgba(122,124,208,.16) 0%, rgba(249,250,255,.96) 100%);
      --card-border-strong:rgba(122,124,208,.32);
      --card-border-hover:rgba(122,124,208,.45);
      --card-shadow:0 12px 28px rgba(32,34,79,.14);
      --card-shadow-hover:0 16px 36px rgba(32,34,79,.2);
      --input-bg:#ffffff; --input-text:var(--text);
      --btn-bg:#7a7cd0; --btn-bg-hover:#5c5ebf; --btn-text:#ffffff;
      --elev-shadow:0 2px 8px rgba(0,0,0,.08);
      --skeleton:#eceeff;
    }
    html[data-theme="dark"] {
      --bg:#05050b; --text:#f0f1ff; --muted:#9ea0d9;
      --card-bg:#101223; --card-text:var(--text); --card-border:#2b2d52;
      --card-gradient:linear-gradient(160deg, rgba(122,124,208,.14) 0%, rgba(16,18,35,.9) 100%);
      --card-border-strong:rgba(156,158,222,.32);
      --card-border-hover:rgba(156,158,222,.5);
      --card-shadow:0 10px 28px rgba(5,6,18,.6);
      --card-shadow-hover:0 14px 36px rgba(5,6,18,.68);
      --input-bg:#05050b; --input-text:var(--text);
      --btn-bg:#5c5ebf; --btn-bg-hover:#7a7cd0; --btn-text:#ffffff;
      --elev-shadow:0 12px 36px rgba(0,0,0,.45);
      --skeleton:#0d0e1d;
    }
    /* Base */
    html[data-theme="dark"] body{ background:var(--bg) !important; color:var(--text) !important; }
    /* Search */
    html[data-theme="dark"] .search-container input[type="text"]{ background:var(--input-bg) !important; color:var(--input-text) !important; border-color:var(--card-border) !important; }
    html[data-theme="dark"] .search-container input[type="text"]:focus{ box-shadow:0 0 6px rgba(56,189,248,.35) !important; border-color:#b9bbef !important; }
    html[data-theme="dark"] .search-container button{ background:var(--btn-bg) !important; color:var(--btn-text) !important; }
    html[data-theme="dark"] .search-container button:hover{ background:var(--btn-bg-hover) !important; }
    /* Cards */
    html[data-theme="dark"] .card{
      background: var(--card-gradient);
      color: var(--card-text);
      border: 1px solid var(--card-border-strong);
      box-shadow: var(--card-shadow);
    }
    html[data-theme="dark"] .card img{ background-color:var(--skeleton); }
    /* Misc */
    html[data-theme="dark"] .no-results{ color:var(--muted) !important; }
    html[data-theme="dark"] .where{ color:#9c9ede !important; }
  </style>

  <style>
/* ========== Modal ========== */
.modal {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;               /* ← مخفية افتراضيًا */
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}
.modal.open {                  /* ← أضِف/احذف .open من JS */
  display: flex;
}

.modal-content {
  background-color: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  text-align: center;
}

/* ========== Base ========== */
html { scroll-behavior: smooth; }
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f9f9f9;
  color: #333;
  direction: rtl;
}
main {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 15px;
}

/* شريط الأدوات أعلى القائمة (مبسّط ومركزي) */
.toolbar{display:flex;justify-content:center;align-items:center;gap:10px;max-width:1000px;margin:0 auto 12px;padding:0}
.toolbar::after{content:none}
/* إخفاء زر الرجوع والنود الفارغة للموازنة */
.back-btn{display:none !important}
.toolbar > div:last-child{display:none}
.toolbar > div[style*="width:120px"]{display:none}
/* العنوان بشكل بسيط ومحاذاة وسط */
.where{font-weight:800;color:#5c5ebf;text-align:center}

/* ========== Search ========== */
.search-container {
  margin: 20px auto;
  max-width: 1000px;
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0;
}
.search-container input[type="text"] {
  flex: 1;
  padding: 12px 15px;
  border: 2px solid #5c5ebf;
  border-radius: 25px;
  font-size: 1rem;
  outline: none;
  transition: 0.3s;
  background:#fff;
}
.search-container input[type="text"]:focus {
  box-shadow: 0 0 5px rgba(0, 119, 204, 0.5);
  border-color: #414391;
}
.search-container button {
  background-color: #5c5ebf;
  border: none;
  padding: 12px 20px;
  border-radius: 25px;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}
.search-container button:hover { background-color: #414391; }

/* ========== Grid (Responsive Cards) ========== */
.categories {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, max-content));
  gap: 20px;
  justify-content: start;
  max-width: 1000px;
  margin: auto;
}

/* ========== Card ========== */
.card{
  position:relative;
  background:var(--card-gradient);
  color:var(--card-text);
  border:1px solid var(--card-border-strong);
  border-radius:14px;
  box-shadow:var(--card-shadow);
  text-align:center;
  padding:16px;
  text-decoration:none;
  transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow:hidden;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at top right, rgba(255,255,255,.32), rgba(255,255,255,0) 60%);
  opacity:.6;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:var(--card-shadow-hover);
  border-color:var(--card-border-hover);
}
html[data-theme="dark"] .card::after{
  background:radial-gradient(circle at top right, rgba(156,158,222,.18), rgba(0,0,0,0) 65%);
  opacity:.45;
}

/* صورة مربعة دائمًا */
.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  height: auto;
  object-fit: cover; object-position: center;
  border-radius: 8px;
  user-select: none;
  background-color: var(--skeleton);
  display: block;
  margin: 0 auto;
}
.card h2 {
  font-weight: 700;
  font-size: 1rem;
  margin: 0;
  line-height: 1.4;
  word-break: break-word;
}

.no-results {
  text-align: center;
  font-size: 1.2rem;
  color: #888;
  margin-top: 30px;
}

/* ========== Maintenance / Loading ========== */
.card.maintenance{ background:var(--card-bg)!important; color:var(--muted)!important; border-color:var(--card-border); box-shadow:none; pointer-events:none; opacity:.7; }
.card.maintenance::after{ display:none; }
.card.maintenance h2{ color:#a00; }
.card.maintenance img{ filter:grayscale(100%); }


.card.loading { position: relative; background: var(--skeleton); overflow: hidden; pointer-events: none; }
.card.loading img,.card.loading h2 { visibility: hidden; }
.card.loading::after {
  content: '';
  position: absolute; top: 0; right: -150px; width: 100px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { 0%{ right:-150px } 100%{ right:100% } }

/* ========== Grid overrides (ثابتة) ========== */
.categories { grid-template-columns: repeat(5, minmax(0, 1fr)) !important; gap: 20px; justify-content: center; }
@media (max-width: 992px) {
  .categories { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
}
@media (max-width: 768px) {
  .categories { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 12px; }
  .card { padding: 12px !important; }
  .card h2 { font-size: .9rem !important; }
}
@media (max-width: 480px) {
  .categories { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 12px; }
  .card { padding: 10px !important; }
  .card h2 { font-size: .9rem !important; }
  .search-container { flex-direction: column; }
  .search-container input, .search-container button { width: 100%; }
  .modal-content { padding: 20px; max-width: 340px; }
}

/* ===== Dark Mode ===== */
body.dark-mode { background:#05050b; color:#f0f1ff; }
body.dark-mode .search-container input[type="text"]{ background:#05050b; color:#f0f1ff; border-color:#2b2d52; }
body.dark-mode .search-container input[type="text"]:focus{ border-color:#b9bbef; box-shadow:0 0 6px rgba(56,189,248,.35); }
body.dark-mode .search-container button{ background:#3b3e8c; }
body.dark-mode .search-container button:hover{ background:#7a7cd0; }
body.dark-mode .card{
  background: var(--card-gradient);
  color: var(--card-text);
  border: 1px solid var(--card-border-strong);
  box-shadow: var(--card-shadow);
}
body.dark-mode .card h2{ color:#f0f1ff; }
body.dark-mode .card.loading{ background:var(--skeleton); }
body.dark-mode .card.loading::after{ background: linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); }
body.dark-mode .no-results{ color:#9ea0d9; }
body.dark-mode .modal-content{ background:#111827; color:#f0f1ff; box-shadow:0 10px 30px rgba(0,0,0,.5); }

/* ==== Modal (نافذة التقديم) محسّن ==== */
.modal {
  position: fixed;
  inset: 0;
  background-color: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}
.modal.open { display: flex; }

.modal-content {
  background: #fff;
  padding: 24px;
  border-radius: 14px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;

  position: relative;
}

/* الهيدر */
.modal-header { display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:1.2rem; font-weight:800; color:#5c5ebf; }
.modal .close { background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:#444; }
.modal .close:hover { color:#cc0000; }

/* البادجات */
.badge {
  display:inline-flex; align-items:center; gap:6px;
  background:#eef0ff; color:#414391; border:1px solid #eceeff;
  padding:6px 10px; border-radius:9999px; font-size:.85rem;
}

/* الحقول والمعلومات */
.info-list { display:grid; gap:10px; }
.info-item { background:#f8fafc; border:1px solid #e6eef7; border-radius:10px; padding:10px; font-size:.95rem; }
.hint { color:#667085; font-size:.9rem; }

      /* الحاسبة */
      .calc { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.calc .field { background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:10px; }
.calc label { display:block; font-size:.85rem; font-weight:600; color:#475467; margin-bottom:4px; }
.calc input { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; }
.calc input:focus { border-color:#5c5ebf; box-shadow:0 0 0 4px rgba(65,67,145,.25); }

/* سعر الصرف */
.rate-line { display:flex; flex-wrap:wrap; align-items:center; gap:10px; font-size:.95rem; }
.rate-line .chip { background:#eceeff; border:1px solid #e2e8f0; border-radius:9999px; padding:6px 10px; }

      /* أزرار الإجراء */
      .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
      .btn { border:none; border-radius:10px; padding:10px 14px; cursor:pointer; font-weight:700; font-size:.95rem; }
      .btn-primary { background:#5c5ebf; color:#fff; }
      .btn-primary:hover { background:#414391; }
      .btn-outline { background:#fff; border:1px solid #cbd5e1; }
      .btn-outline:hover { background:#f9fafb; }
      .btn[disabled] { opacity:.6; cursor:not-allowed; }

      /* حالة نجاح لزر إثبات الدفع */
      #proofTrigger.success { background:#16a34a; color:#fff; border-color:#15803d; }
      body.dark-mode #proofTrigger.success { background:#16a34a; color:#fff; border-color:#166534; }

      /* السماح بالنسخ داخل نافذة الإيداع للجوال عند تحديد النص */
      .modal, .modal * { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }

/* المعاينة */
.preview { font-size:.9rem; color:#5c5ebf; word-break:break-all; }

/* Responsive */
@media (max-width: 480px) {
  .modal-content { padding:18px; max-width:340px; }
  .calc { grid-template-columns:1fr; }
  .actions { flex-direction:column; }
  .btn, .btn-primary, .btn-outline { width:100%; }
}

/* Dark Mode */
body.dark-mode .modal-content { background:#111827; color:#f0f1ff; }

/* ===== تصغير نافذة التقديم على الهواتف ===== */
@media (max-width: 480px) {
  .modal { 
    padding: 8px;
    /* دعم نوتش iOS */
    padding-top: max(8px, env(safe-area-inset-top));
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  .modal-content {
    width: 100%;
    max-width: 92vw;           /* أصغر من عرض الشاشة قليلاً */
    padding: 12px 14px;        /* تقليل الحشو */
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);

    max-height: calc(100vh - 24px); /* لا تتجاوز ارتفاع الشاشة */
    overflow-y: auto;               /* تمرير داخلي عند الطول الكبير */
    -webkit-overflow-scrolling: touch;
    gap: 10px;                      /* فجوات أصغر بين العناصر */
  }

  /* هيدر المودال أكثر إحكامًا */
  .modal-header {
    position: sticky; top: 0; z-index: 1;
    background: inherit;            /* يطابق خلفية المودال */
    margin: -12px -14px 8px;        /* تمديد الخلفية للحواف */
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .modal-title { font-size: 1rem; }
  .badge { padding: 4px 8px; font-size: .8rem; }

  /* الحاسبة عمود واحد وأحجام أصغر */
  .calc { grid-template-columns: 1fr; gap: 8px; }
  .calc .field { padding: 8px; border-radius: 10px; }
  .calc label { font-size: .8rem; margin-bottom: 3px; }
  .calc input {
    padding: 8px 10px;
    font-size: 16px;   /* يمنع تكبير iOS التلقائي */
  }

  /* سطر السعر */
  .rate-line { gap: 6px; font-size: .85rem; }
  .rate-line .chip { padding: 4px 8px; }

  /* صناديق المعلومات */
  .info-item { padding: 8px; font-size: .9rem; }

  /* الأزرار بعرض كامل */
  .actions { flex-direction: column; gap: 8px; margin-top: 6px; }
  .btn, .btn-primary, .btn-outline { width: 100%; padding: 10px 12px; font-size: .95rem; }

  /* عرض اسم الملف الطويل بدون كسر التصميم */
  .preview { font-size: .85rem; overflow-wrap: anywhere; }
}

    async function copyToClipboard(text){
      const value = (text==null) ? '' : String(text);
      if (!value.trim()) return false;
      try{
        if (navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(value);
          return true;
        }
      }catch(_){}
      let textarea = null;
      try{
        textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.setAttribute('readonly','');
        textarea.style.position='fixed';
        textarea.style.opacity='0';
        textarea.style.pointerEvents='none';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        const ok = document.execCommand && document.execCommand('copy');
        return !!ok;
      }catch(_){
        return false;
      }finally{
        if (textarea && textarea.parentNode){
          textarea.parentNode.removeChild(textarea);
        }
      }
    }

        cryptoSource = window.crypto;

        cryptoSource = self.crypto;
      }
      if (cryptoSource){
        var buf = new Uint32Array(2);
        cryptoSource.getRandomValues(buf);
        var hex = Array.from(buf).map(function(n){ return n.toString(16).padStart(8,'0'); }).join('');
        return tag + '-' + Date.now().toString(36) + '-' + hex;
      }
    }catch(_){}
    return tag + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);

    function readDepositHintFromBrandCache(){
      const sources = [];
      try {
        if (typeof window !== 'undefined' && window.__SITE_BRAND__ && typeof window.__SITE_BRAND__ === 'object') {
          sources.push(window.__SITE_BRAND__);
        }

      try {

          const runtimeBrand = window.__getSiteBrandConfig();
          if (runtimeBrand && typeof runtimeBrand === 'object') sources.push(runtimeBrand);
        }
      } catch(_) {}
      try {
        const raw = localStorage.getItem('site:brand:v1');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') sources.push(parsed);
        }
      } catch(_) {}
      for (const src of sources) {
        const text = String(
          src?.depositHint ??
          src?.deposit_hint ??
          src?.depositDescription ??
          src?.deposit_description ??
          src?.depositModalHint ??
          src?.deposit_modal_hint ??
          ''
        ).trim();
        if (text) return text;
      }
      return '';

      const cachedBrandHint = readDepositHintFromBrandCache();
      if (cachedBrandHint) {
        applyMethodHintText(cachedBrandHint);

      if (depositHintLoaded) {
        return applyMethodHintText(cachedDepositHintText);

      if (!depositDb || typeof depositDb.collection !== 'function') {

      try {
        const snap = await depositDb.collection('config').doc('siteState').get();
        if (snap && snap.exists) {
          const data = snap.data() || {};
          const brand = (data && typeof data.brand === 'object')
            ? data.brand

          applyMethodHintText(
            brand.depositHint ||

          const row = (node.closest && node.closest('.copyable-row')) || null;
          const valueNode = row && row.querySelector ? row.querySelector('.copyable-value') : null;
          const buttonNode = row && row.querySelector ? row.querySelector('.copy') : null;

          if (valueNode) valueNode.classList.add('copied');

    function buildMethodInfoEntries(method){
      const data = getMethodData(method);
      const info = (data && typeof data.info === 'object') ? data.info : {};
      const fields = [];
      const seen = new Set();
      const pushField = (entry) => {
        const label = String(entry?.label || '').trim();
        const value = String(entry?.value == null ? '' : entry.value).trim();
        if (!label || !value) return;
        const uniqueKey = String(entry?.key || `${label}::${value}`).trim().toLowerCase();
        if (uniqueKey && seen.has(uniqueKey)) return;
        if (uniqueKey) seen.add(uniqueKey);
        fields.push({
          key: uniqueKey || `${label}::${fields.length}`,
          label,
          value,
          copyable: entry?.copyable === true
        });
      };

      const displayFields = normalizeDisplayFields(data.displayFields);
      if (displayFields.length) {
        displayFields.forEach((entry) => {
          pushField({
            key: entry.key,
            label: entry.label,
            value: entry.value,
            copyable: entry.copyable !== false
          });
        });
      } else {
        if (info.bank) pushField({ key: 'bank', label: 'البنك', value: info.bank });
        if (info.accountName) pushField({ key: 'account_name', label: 'اسم المستفيد', value: info.accountName });
        if (info.accountNumber) pushField({ key: 'account_number', label: 'رقم الحساب', value: info.accountNumber, copyable: true });
        if (info.iban) pushField({ key: 'iban', label: 'IBAN', value: info.iban, copyable: true });
        normalizeTransferTargets(data.transferTargets).forEach((entry, index) => {
          pushField({
            key: entry.key || `transfer_target_${index + 1}`,
            label: entry.label || 'الرقم',
            value: entry.value,
            copyable: true
          });
        });
        const walletFallback = String(info.wallet || '').trim();
        if (!fields.length && walletFallback) {
          walletFallback
            .split(/\r?\n|[,;]+/g)
            .map((value) => String(value || '').trim())
            .filter(Boolean)
            .forEach((value, index) => {
              pushField({
                key: `wallet_${index + 1}`,
                label: 'الرقم',
                value,
                copyable: true
              });
            });
        }
      }

      const feeFixed = Number(data.feeFixed || 0);
      if (Number.isFinite(feeFixed) && feeFixed > 0) {
        pushField({ key: 'fee_fixed', label: 'العمولة الثابتة', value: String(feeFixed) });
      }
      const noteText = getMethodNoteText(data);
      if (noteText) {
        pushField({ key: 'note_text', label: 'ملاحظة', value: noteText });
      }
      return fields;
    }

    function renderMethodInfo(method){
      if (!methodInfo) return;
      const fields = buildMethodInfoEntries(method);
      methodInfo.innerHTML = fields.length
        ? fields.map((entry) => {
            const label = String(entry?.label || '');
            const rawValue = String(entry?.value == null ? '' : entry.value);
            const htmlValue = zEscHtml(rawValue).replace(/\r?\n/g, '<br>');
            const copyAttrs = entry?.copyable
              ? ` role="button" tabindex="0" data-copy-value="${zEscHtml(rawValue)}"`
              : '';
            const copyClass = entry?.copyable ? ' copyable-value' : '';
            const copyButton = entry?.copyable
              ? `<button class="copy" type="button" aria-label="نسخ" data-copy-value="${zEscHtml(rawValue)}"><span class="copy-icons"><svg xml:space="preserve" style="enable-background:new 0 0 512 512" viewBox="0 0 6.35 6.35" y="0" x="0" height="20" width="20" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" xmlns="http://www.w3.org/2000/svg" class="clipboard"><g><path fill="currentColor" d="M2.43.265c-.3 0-.548.236-.573.53h-.328a.74.74 0 0 0-.735.734v3.822a.74.74 0 0 0 .735.734H4.82a.74.74 0 0 0 .735-.734V1.529a.74.74 0 0 0-.735-.735h-.328a.58.58 0 0 0-.573-.53zm0 .529h1.49c.032 0 .049.017.049.049v.431c0 .032-.017.049-.049.049H2.43c-.032 0-.05-.017-.05-.049V.843c0-.032.018-.05.05-.05zm-.901.53h.328c.026.292.274.528.573.528h1.49a.58.58 0 0 0 .573-.529h.328a.2.2 0 0 1 .206.206v3.822a.2.2 0 0 1-.206.205H1.53a.2.2 0 0 1-.206-.205V1.529a.2.2 0 0 1 .206-.206z"></path></g></svg><svg xml:space="preserve" style="enable-background:new 0 0 512 512" viewBox="0 0 24 24" y="0" x="0" height="18" width="18" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" xmlns="http://www.w3.org/2000/svg" class="checkmark"><g><path data-original="#000000" fill="currentColor" d="M9.707 19.121a.997.997 0 0 1-1.414 0l-5.646-5.647a1.5 1.5 0 0 1 0-2.121l.707-.707a1.5 1.5 0 0 1 2.121 0L9 14.171l9.525-9.525a1.5 1.5 0 0 1 2.121 0l.707.707a1.5 1.5 0 0 1 0 2.121z"></path></g></svg></span></button>`
              : '';
            return `<div class="info-item" data-label="${zEscHtml(label)}"><strong>${zEscHtml(label)}</strong><div class="info-value${entry?.copyable ? ' copyable-row' : ''}"><span class="value-text${copyClass}"${copyAttrs}>${htmlValue}</span>${copyButton}</div></div>`;
          }).join('')
        : '<div class="info-item">لا توجد تفاصيل متاحة لهذه الطريقة حالياً.</div>';
    }

    function isTextareaField(type){
      return type === 'textarea' || type === 'multiline';
    }

    function isSelectField(type, def){
      return (type === 'select' || type === 'dropdown') && Array.isArray(def?.options) && def.options.length > 0;
    }

    function resolveInputType(type){
      const safe = String(type || 'text').trim().toLowerCase();
      if (safe === 'number' || safe === 'tel' || safe === 'email') return safe;
      return 'text';
    }

    function setDynamicFieldInvalid(control, invalid){
      if (!control) return;
      control.classList.toggle('is-invalid', !!invalid);
      const wrap = control.closest ? control.closest('.dynamic-extra-field') : null;
      if (wrap) wrap.classList.toggle('is-invalid', !!invalid);
    }

    function renderDynamicExtraFields(method){
      if (!dynamicExtraFields || !dynamicExtraFieldsGrid) return;
      const defs = getMethodExtraFields(method);
      dynamicExtraFieldsGrid.innerHTML = '';
      setDynamicExtraStatus('', '');
      if (!defs.length) {
        dynamicExtraFields.hidden = true;
        return;
      }
      defs.forEach((def) => {
        const wrap = document.createElement('div');
        wrap.className = 'dynamic-extra-field';
        const safeType = String(def.type || 'text').trim().toLowerCase();
        if (isTextareaField(safeType) || isSelectField(safeType, def)) {
          wrap.classList.add('full');
        }

        const fieldId = `dynamic_extra_${String(def.key || '').replace(/[^a-zA-Z0-9_-]+/g, '_') || 'field'}`;
        const label = document.createElement('label');
        label.className = 'dynamic-extra-label';
        label.setAttribute('for', fieldId);
        label.innerHTML = `<span>${zEscHtml(def.label)}</span><em class="dynamic-extra-badge${def.required ? '' : ' dynamic-extra-badge-optional'}">${def.required ? 'مطلوب' : 'اختياري'}</em>`;
        wrap.appendChild(label);

        let control;
        if (isTextareaField(safeType)) {
          control = document.createElement('textarea');
        } else if (isSelectField(safeType, def)) {
          control = document.createElement('select');
          const placeholderOption = document.createElement('option');
          placeholderOption.value = '';
          placeholderOption.textContent = def.placeholder || `اختر ${def.label}`;
          control.appendChild(placeholderOption);
          def.options.forEach((option) => {
            const optionEl = document.createElement('option');
            optionEl.value = String(option.value || '').trim();
            optionEl.textContent = String(option.label || option.value || '').trim();
            control.appendChild(optionEl);
          });
        } else {
          control = document.createElement('input');
          control.type = resolveInputType(safeType);
        }

        control.id = fieldId;
        control.className = 'dynamic-extra-control';
        control.dataset.fieldKey = String(def.key || '').trim();
        control.placeholder = def.placeholder || '';
        if (def.required) control.required = true;

        const initialValue = String(currentExtraFieldValues[def.key] == null ? '' : currentExtraFieldValues[def.key]);
        if (initialValue) control.value = initialValue;

        const syncValue = () => {
          currentExtraFieldValues[def.key] = String(control.value == null ? '' : control.value);
          if (String(control.value || '').trim()) setDynamicFieldInvalid(control, false);
          if (dynamicExtraStatus && !dynamicExtraStatus.hidden) setDynamicExtraStatus('', '');
          updateSubmitState();
        };
        control.addEventListener('input', syncValue);
        control.addEventListener('change', syncValue);

        wrap.appendChild(control);
        if (def.placeholder) {
          const hint = document.createElement('div');
          hint.className = 'dynamic-extra-hint';
          hint.textContent = def.placeholder;
          wrap.appendChild(hint);
        }
        dynamicExtraFieldsGrid.appendChild(wrap);
      });
      dynamicExtraFields.hidden = false;
    }

    const fxBadge = document.getElementById('fxBadge');
    const fxText  = document.getElementById('fxText');
    const rateLine = document.getElementById('rateLine');
    const sendJOD = document.getElementById('sendJOD'); // مبلغ الدفع بعملة الطريقة
    const recvCUR = document.getElementById('recvCUR'); // ما سيُضاف بالدولار

    /* ========================= حالة وتنقّل ========================= */
    let currentCountry = null; // { id, data }
    let countries = [];
    let methods = [];
    let currentMethod = null;
    let currentProofFile = null;
    let uploadedProofUrl = null;

    // قيم FX القادمة من الخادم
    let fxCurrency = null;      // عملة الطريقة (مثلاً USD)
    let fxRatePerJOD = null;    // 1 JOD -> كم من عملة الطريقة (CUR)
    let fxRatePerUSD = null;    // 1 USD -> كم من عملة الطريقة (CUR)
    let usdPerJOD = null;       // 1 JOD -> كم USD (لاحتساب الإضافة بالدولار)
    let fxFeeFixed = 0;         // عمولة ثابتة بعملة الطريقة
    // تتبُّع حالة التفرّع عبر العنوان
    let pendingRoute = null;     // يُستخدم لوضع المسار المطلوب حتى تكتمل قائمة الدول

    // جلب قيمة 1 JOD بالدولار من إعداد عام (config/currency)
    async function fetchUsdPerJODFromConfig(){
      try{
        const snap = await depositDb.collection('config').doc('currency').get();
        if(!snap || !snap.exists) return null;
        const d = snap.data() || {};
        let rates = {};
        try { rates = JSON.parse(d.ratesJson || '{}') || {}; } catch(_){ rates = {}; }
        const getVal = (obj)=>{
          if (obj && typeof obj === 'object'){
            if (obj.rate!=null) return Number(obj.rate);
            if (obj.RATE!=null) return Number(obj.RATE);
            if (obj.value!=null) return Number(obj.value);
          }
          if (typeof obj === 'number') return Number(obj);
          return NaN;
        };
        // نفترض أن ratesJson دائمًا يمثل: كم تساوي 1 USD من كل عملة
        // أي إن كان JOD: 1.4085 → فهذا يعني 1 USD = 1.4085 JOD ⇒ 1 JOD = 1/1.4085 USD
        const jodPerUSD = getVal(rates.JOD);
        if (!Number.isFinite(jodPerUSD) || jodPerUSD<=0) return null;
        return 1 / jodPerUSD;
      }catch(_){ return null; }
    }

    /* ========================= أدوات UI ========================= */
    function cardSkeleton(count=1){
      if (!grid){
        debugCountriesLog('error', 'Grid element not found while rendering skeleton');
        setCountriesRetryButtonVisible(true, 'grid_missing');
        return;
      }
      grid.innerHTML='';
      showNoResults(false);
      for(let i=0;i<count;i++){
        const div=document.createElement('div');
        div.className='card loading';
        div.innerHTML='<img alt=""/><h2>—</h2>';
        grid.appendChild(div);
      }
    }
    function clearGrid(){ if (grid) grid.innerHTML=''; }
    function showNoResults(show){ if (noResults) noResults.style.display = show ? 'block' : 'none'; }
    function openModal(){ if (methodModal) methodModal.classList.add('open'); }
    function closeModalFn(){
      if (methodModal) methodModal.classList.remove('open');
      currentMethod = null;
      currentExtraFieldValues = Object.create(null);
      setDynamicExtraStatus('', '');
      sendJOD.value = '';
      recvCUR.value = '';
      fxCurrency = null;
      fxRatePerJOD = null;
      fxRatePerUSD = null;
      usdPerJOD = null;
      fxFeeFixed = 0;
      fxBadge.classList.add('hidden');
      fxText.textContent = '';
      rateLine.textContent = '—';
      currentProofFile = null;
      uploadedProofUrl = null;
      if (proofFileEl) proofFileEl.value = '';
      proofPreview.textContent = '';
      if (methodInfo) methodInfo.innerHTML = '';
      if (dynamicExtraFieldsGrid) dynamicExtraFieldsGrid.innerHTML = '';
      if (dynamicExtraFields) dynamicExtraFields.hidden = true;
      updateSubmitState();
      try { updateProofUI(); } catch(_){ }
    }

    /* ========================= رسم القوائم ========================= */
    function renderCountries(list){
      if (!grid){
        debugCountriesLog('error', 'Grid element not found while rendering countries');
        showNoResults(true);
        setCountriesRetryButtonVisible(true, 'grid_missing');
        return;
      }
      clearGrid();
      list.forEach(c=>{
        const a=document.createElement('a');
        a.href=buildCountryHash(c.id);
        a.className='card';
        a.dataset.countryId = String(c.id || '');
        a.dataset.title=c.data.name||'';
        a.setAttribute('role','button');
        a.setAttribute('tabindex','0');
        a.innerHTML=`
          <img src="${c.data.imageUrl||''}" alt="${c.data.name||''}">
          <h2>${c.data.name||''}</h2>`;
        a.addEventListener('click',(ev)=>{
          try { ev.preventDefault(); ev.stopPropagation(); } catch(_){ }
          navigateToCountry(c);
        });
        a.addEventListener('keydown',(ev)=>{
          if (!ev) return;
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          try { ev.preventDefault(); ev.stopPropagation(); } catch(_){ }
          navigateToCountry(c);
        });
        grid.appendChild(a);
      });
      showNoResults(list.length===0);
      if (!currentCountry) setCountriesRetryButtonVisible(((countries || []).length === 0), 'countries_empty');
    }

    /* ========================= بحث ========================= */
    function applySearch(){
      const q=(((searchInput && searchInput.value) || '')+'').trim().toLowerCase();
      const list=currentCountry?methods:countries;
      const filtered=list.filter(x=>(x.data.name||'').toLowerCase().includes(q));
      currentCountry?renderMethods(filtered):renderCountries(filtered);
    }
    if (searchInput) searchInput.addEventListener('input', applySearch);
    if (grid && grid.dataset.boundCountryDelegate !== '1'){
      grid.dataset.boundCountryDelegate = '1';
      grid.addEventListener('click', (ev)=>{
        if (!ev || currentCountry) return;
        const card = ev.target && ev.target.closest ? ev.target.closest('.card[data-country-id]') : null;
        if (!card) return;
        const id = String(card.dataset.countryId || '').trim();
        if (!id) return;
        const country = (countries || []).find((x)=> String(x && x.id || '').trim() === id);
        if (!country) return;
        try { ev.preventDefault(); ev.stopPropagation(); } catch(_){ }
        navigateToCountry(country);
      }, true);
    }

    /* ========================= جلب الدول & الطرق ========================= */
        function normalizeWorkerCountries(list){
      return (Array.isArray(list) ? list : [])
        .map((entry) => {
          const id = String(entry?.id || '').trim();
          const payload = (entry?.data && typeof entry.data === 'object') ? entry.data : {};
          if (!id || payload.active === false) return null;
          return { id, data: payload };
        })
        .filter(Boolean);
    }

    const DEPOSIT_COUNTRIES_CACHE_KEY = 'edaa:deposit:countries:v1';
    const DEPOSIT_COUNTRIES_CACHE_META_KEY = 'edaa:deposit:countries:meta:v1';
    const depositFxCache = new Map();
    let countriesLoadedFromWorker = false;

    function buildFxCacheKey(countryId, methodId){
      const c = String(countryId || '').trim().toUpperCase();
      const m = String(methodId || '').trim().toUpperCase();
      if (!c || !m) return '';
      return `${c}::${m}`;
    }

    function clearDepositCountriesCache(){
      try { localStorage.removeItem(DEPOSIT_COUNTRIES_CACHE_KEY); } catch(_){ }
      try { localStorage.removeItem(DEPOSIT_COUNTRIES_CACHE_META_KEY); } catch(_){ }
    }

    function readDepositCountriesCache(){
      try {
        const raw = localStorage.getItem(DEPOSIT_COUNTRIES_CACHE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        const list = Array.isArray(parsed?.countries)
          ? parsed.countries
          : (Array.isArray(parsed) ? parsed : []);
        return normalizeWorkerCountries(list);
      } catch(_){
        return [];
      }
    }

    function normalizeTransferTargets(raw){
      if (!Array.isArray(raw)) return [];
      return raw.map((entry, index) => {
        if (entry && typeof entry === 'object') {
          const value = String(
            entry.value ??
            entry.number ??
            entry.address ??
            entry.target ??
            entry.account ??
            ''
          ).trim();
          const label = String(entry.label || entry.name || entry.title || '').trim();
          if (!value) return null;
          return {
            key: String(entry.key || `transfer_target_${index + 1}`).trim() || `transfer_target_${index + 1}`,
            label: label || 'الرقم',
            value
          };
        }
        const value = String(entry || '').trim();
        if (!value) return null;
        return {
          key: `transfer_target_${index + 1}`,
          label: 'الرقم',
          value
        };
      }).filter(Boolean);
    }

    function normalizeExtraFieldOptions(raw){
      const list = Array.isArray(raw)
        ? raw
        : (typeof raw === 'string' ? raw.split(/\r?\n|[,;]+/g) : []);
      return list.map((entry, index) => {
        if (entry && typeof entry === 'object') {
          const value = String(entry.value ?? entry.id ?? entry.key ?? entry.label ?? '').trim();
          const label = String(entry.label ?? entry.name ?? value).trim();
          if (!value && !label) return null;
          return { value: value || label, label: label || value || `الخيار ${index + 1}` };
        }
        const value = String(entry || '').trim();
        if (!value) return null;
        return { value, label: value };
      }).filter(Boolean);
    }

    function normalizeExtraFields(raw){
      if (!Array.isArray(raw)) return [];
      return raw.map((entry, index) => {
        if (!entry || typeof entry !== 'object') return null;
        const key = String(entry.key || entry.id || `field_${index + 1}`).trim();
        const label = String(entry.label || entry.name || key).trim();
        if (!key || !label) return null;
        const type = String(entry.type || entry.inputType || entry.kind || 'text').trim().toLowerCase();
        const placeholder = String(entry.placeholder || entry.hint || entry.helpText || '').trim();
        return {
          key,
          label,
          type: type || 'text',
          required: !!entry.required,
          placeholder,
          options: normalizeExtraFieldOptions(entry.options)
        };
      }).filter(Boolean);
    }

    function normalizeDisplayFields(raw){
      if (!Array.isArray(raw)) return [];
      return raw.map((entry, index) => {
        if (entry && typeof entry === 'object') {
          const value = String(
            entry.value ??
            entry.text ??
            entry.content ??
            entry.number ??
            entry.address ??
            ''
          ).trim();
          const label = String(entry.label || entry.name || entry.title || '').trim();
          if (!value && !label) return null;
          return {
            key: String(entry.key || `display_field_${index + 1}`).trim() || `display_field_${index + 1}`,
            label: label || 'تفاصيل التحويل',
            value,
            copyable: entry.copyable !== false
          };
        }
        const value = String(entry || '').trim();
        if (!value) return null;
        return {
          key: `display_field_${index + 1}`,
          label: 'تفاصيل التحويل',
          value,
          copyable: true
        };
      }).filter(Boolean);
    }

    function sanitizeFxPayload(raw = {}){
      const currencyCode = String(raw.currencyCode || raw.currency || '').trim().toUpperCase();
      if (!currencyCode) return null;

      let ratePerJOD = toPositiveOrNull(raw.ratePerJOD);
      const rateToJOD = toPositiveOrNull(raw.rateToJOD);
      if (!isPositiveNumber(ratePerJOD) && isPositiveNumber(rateToJOD)) {
        ratePerJOD = 1 / rateToJOD;
      }
      if (currencyCode === 'JOD' && !isPositiveNumber(ratePerJOD)) {
        ratePerJOD = 1;
      }

      let ratePerUSD = toPositiveOrNull(raw.ratePerUSD);
      if (currencyCode === 'USD' && !isPositiveNumber(ratePerUSD)) {
        ratePerUSD = 1;
      }

      let usdPerJOD = toPositiveOrNull(raw.usdPerJOD);
      if (!isPositiveNumber(usdPerJOD) && isPositiveNumber(ratePerJOD) && isPositiveNumber(ratePerUSD)) {
        usdPerJOD = ratePerJOD / ratePerUSD;
      }
      if (!isPositiveNumber(ratePerUSD) && isPositiveNumber(ratePerJOD) && isPositiveNumber(usdPerJOD)) {
        ratePerUSD = ratePerJOD / usdPerJOD;
      }
      if (!isPositiveNumber(ratePerJOD) && isPositiveNumber(ratePerUSD) && isPositiveNumber(usdPerJOD)) {
        ratePerJOD = ratePerUSD * usdPerJOD;
      }

      let transferTargets = normalizeTransferTargets(raw.transferTargets);
      if (!transferTargets.length) {
        const wallet = String(raw?.info?.wallet || raw.wallet || '').trim();
        if (wallet) {
          transferTargets = wallet
            .split(/\r?\n|[,;]+/g)
            .map((v) => String(v || '').trim())
            .filter(Boolean);
        }
      }

      const feeRaw = Number(raw.feeFixed);
      return {
        currencyCode,
        ratePerJOD: Number(isPositiveNumber(ratePerJOD) ? ratePerJOD : 0),
        ratePerUSD: Number(isPositiveNumber(ratePerUSD) ? ratePerUSD : 0),
        usdPerJOD: Number(isPositiveNumber(usdPerJOD) ? usdPerJOD : 0),
        feeFixed: Number.isFinite(feeRaw) ? feeRaw : 0,
        transferTargets,
        displayFields: normalizeDisplayFields(raw.displayFields),
        extraFields: normalizeExtraFields(raw.extraFields)
      };
    }

    function hasUsableFxPayload(fx){
      if (!fx || typeof fx !== 'object') return false;
      const currencyCode = String(fx.currencyCode || '').trim().toUpperCase();
      if (!currencyCode) return false;
      if (currencyCode === 'USD' || currencyCode === 'JOD') return true;
      if (isPositiveNumber(Number(fx.ratePerUSD))) return true;
      if (isPositiveNumber(Number(fx.ratePerJOD))) return true;
      return false;
    }

    function hydrateFxCacheFromCountries(list){
      (Array.isArray(list) ? list : []).forEach((country) => {
        const countryId = String(country?.id || '').trim();
        const methodsMap = (country?.data && typeof country.data.methodsMap === 'object')
          ? country.data.methodsMap
          : null;
        if (!countryId || !methodsMap) return;
        Object.entries(methodsMap).forEach(([methodId, methodData]) => {
          const key = buildFxCacheKey(countryId, methodId);
          if (!key) return;
          const fx = sanitizeFxPayload(methodData || {});
          if (fx) depositFxCache.set(key, fx);
        });
      });
    }

    function saveDepositCountriesCache(list, base = ''){
      const normalized = normalizeWorkerCountries(list);
      try {
        localStorage.setItem(DEPOSIT_COUNTRIES_CACHE_KEY, JSON.stringify({
          savedAt: Date.now(),
          countries: normalized
        }));
        localStorage.setItem(DEPOSIT_COUNTRIES_CACHE_META_KEY, JSON.stringify({
          savedAt: Date.now(),
          base: normalizeWorkerBase(base) || ''
        }));
      } catch(_){ }
      hydrateFxCacheFromCountries(normalized);
      return normalized;
    }

    async function loadCountriesFromWorker(base = WORKER){
      const workerBase = normalizeWorkerBase(base);
      if (!workerBase) {
        countriesLoadDebugState.lastError = 'worker_base_missing';
        debugCountriesLog('error', 'Worker base is missing', { base });
        throw new Error('worker_base_missing');
      }
      const url = `${workerBase}/deposit/countries`;
      countriesLoadDebugState.requestStarted = true;
      countriesLoadDebugState.lastRequestUrl = url;
      debugCountriesLog('info', 'Sending countries request', { url });
      let res;
      let data = {};
      try {
        res = await fetch(url, { method: 'GET' });
        data = await res.json().catch(() => ({}));
      } catch (fetchErr){
        countriesLoadDebugState.lastError = (fetchErr && fetchErr.message) ? fetchErr.message : String(fetchErr || 'network_error');
        debugCountriesLog('error', 'Countries request network failed', { url, error: countriesLoadDebugState.lastError });
        throw fetchErr;
      }
      if (!res.ok || data?.success !== true || !Array.isArray(data?.countries)) {
        const apiError = (data && data.error) ? data.error : `worker_countries_failed_status_${res.status}`;
        countriesLoadDebugState.lastError = apiError;
        debugCountriesLog('error', 'Countries request responded with invalid payload', {
          url,
          status: res.status,
          success: data && data.success,
          error: apiError
        });
        throw new Error(apiError);
      }
      debugCountriesLog('info', 'Countries request succeeded', { url, count: Array.isArray(data.countries) ? data.countries.length : 0 });
      return normalizeWorkerCountries(data.countries);
    }

    async function loadCountriesFromAvailableWorkers(opts = {}){
      const forceRefresh = opts?.forceRefresh === true;
      const preferCache = opts?.preferCache !== false;

      if (!forceRefresh && preferCache) {
        const cached = readDepositCountriesCache();
        if (cached.length) {
          debugCountriesLog('info', 'Using countries cache', { count: cached.length });
          hydrateFxCacheFromCountries(cached);
          return cached;
        }
      }

      const tried = new Set();
      const bases = [WORKER, WORKER_DEFAULT]
        .map((base) => normalizeWorkerBase(base))
        .filter((base) => {
          if (!base || tried.has(base)) return false;
          tried.add(base);
          return true;
        });
      let lastErr = null;
      debugCountriesLog('info', 'Trying worker bases for countries', { bases });
      for (const base of bases) {
        try {
          debugCountriesLog('info', 'Attempting countries request from base', { base });
          const list = await loadCountriesFromWorker(base);
          if (Array.isArray(list) && list.length) {
            debugCountriesLog('info', 'Loaded countries from worker base', { base, count: list.length });
            return saveDepositCountriesCache(list, base);
          }
          lastErr = new Error(`worker_countries_empty:${base}`);
          debugCountriesLog('warn', 'Worker returned empty countries list', { base });
        } catch (err) {
          lastErr = err;
          debugCountriesLog('warn', 'Worker base failed while loading countries', {
            base,
            error: (err && err.message) ? err.message : String(err || 'unknown_error')
          });
        }
      }

      if (!forceRefresh && preferCache) {
        const cached = readDepositCountriesCache();
        if (cached.length) {
          debugCountriesLog('warn', 'All worker bases failed, fallback to cached countries', { count: cached.length });
          hydrateFxCacheFromCountries(cached);
          return cached;
        }
      }
      debugCountriesLog('error', 'All worker bases failed and cache unavailable', {
        error: (lastErr && lastErr.message) ? lastErr.message : 'worker_countries_failed'
      });
      throw lastErr || new Error('worker_countries_failed');
    }

    async function fetchFx(countryId, methodId, methodData = null){
      const fxKey = buildFxCacheKey(countryId, methodId);
      if (fxKey && depositFxCache.has(fxKey)) {
        const cached = depositFxCache.get(fxKey);
        if (hasUsableFxPayload(cached)) return cached;
        depositFxCache.delete(fxKey);
      }

      const fromMethodData = sanitizeFxPayload(methodData || {});
      if (hasUsableFxPayload(fromMethodData)) {
        if (fxKey) depositFxCache.set(fxKey, fromMethodData);
        return fromMethodData;
      }

      const cachedCountries = readDepositCountriesCache();
      if (cachedCountries.length) {
        const country = cachedCountries.find((entry) =>
          String(entry?.id || '').toLowerCase() === String(countryId || '').toLowerCase()
        );
        const map = (country?.data && typeof country.data.methodsMap === 'object')
          ? country.data.methodsMap
          : null;
        if (map && Object.prototype.hasOwnProperty.call(map, methodId)) {
          const fromCachedMap = sanitizeFxPayload(map[methodId] || {});
          if (hasUsableFxPayload(fromCachedMap)) {
            if (fxKey) depositFxCache.set(fxKey, fromCachedMap);
            return fromCachedMap;
          }
        }
      }

      const url = `${WORKER}/deposit/fx?countryId=${encodeURIComponent(countryId)}&methodId=${encodeURIComponent(methodId)}`;
      const res = await fetch(url, { method:'GET' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success !== true) throw new Error(data.error || 'تعذر جلب سعر الصرف');

      const normalized = sanitizeFxPayload(data || {});
      if (!hasUsableFxPayload(normalized)) throw new Error('تعذر قراءة بيانات سعر الصرف');
      if (fxKey) depositFxCache.set(fxKey, normalized);
      return normalized;
    }

    function format4(n){
      const s=(Math.round(n*10000)/10000).toFixed(4);

    function toPositiveOrNull(value){
      const n = Number(value);
      return Number.isFinite(n) && n > 0 ? n : null;
    }

    function isPositiveNumber(value){
      return typeof value === 'number' && Number.isFinite(value) && value > 0;
    }

    function reconcileFxNumbers(){
      const curCode = (fxCurrency || '').toUpperCase();
      if (curCode === 'USD' && !isPositiveNumber(fxRatePerUSD)) {
        fxRatePerUSD = 1;
      }
      if (curCode === 'JOD' && !isPositiveNumber(fxRatePerJOD)) {
        fxRatePerJOD = 1;
      }
      if (!isPositiveNumber(usdPerJOD) && isPositiveNumber(fxRatePerJOD) && isPositiveNumber(fxRatePerUSD)) {
        usdPerJOD = fxRatePerJOD / fxRatePerUSD;
      }
      if (!isPositiveNumber(fxRatePerUSD) && isPositiveNumber(fxRatePerJOD) && isPositiveNumber(usdPerJOD)) {
        fxRatePerUSD = fxRatePerJOD / usdPerJOD;
      }
      if (!isPositiveNumber(fxRatePerJOD) && isPositiveNumber(fxRatePerUSD) && isPositiveNumber(usdPerJOD)) {
        fxRatePerJOD = fxRatePerUSD * usdPerJOD;
      }
    }

    function computeUsdFromCur(amount){
      const v = Number(amount);
      if (!Number.isFinite(v) || v <= 0) return null;
      const fee = Number.isFinite(Number(fxFeeFixed)) && Number(fxFeeFixed) > 0 ? Number(fxFeeFixed) : 0;
      const net = v - fee;
      if (!Number.isFinite(net) || net <= 0) return null;
      const curCode = (fxCurrency || '').toUpperCase();
      if (!curCode) return null;
      if (curCode === 'USD') return net;
      if (curCode === 'JOD' && isPositiveNumber(usdPerJOD)) return net * usdPerJOD;
      if (isPositiveNumber(fxRatePerUSD)) return net / fxRatePerUSD;
      if (isPositiveNumber(fxRatePerJOD) && isPositiveNumber(usdPerJOD)) {
        const jod = net / fxRatePerJOD;
        return jod * usdPerJOD;
      }
      return null;
    }

    function computeCurFromUsd(amount){
      const v = Number(amount);
      if (!Number.isFinite(v) || v <= 0) return null;
      const fee = Number.isFinite(Number(fxFeeFixed)) && Number(fxFeeFixed) > 0 ? Number(fxFeeFixed) : 0;
      const curCode = (fxCurrency || '').toUpperCase();
      if (!curCode) return null;
      if (curCode === 'USD') return v + fee;
      if (curCode === 'JOD' && isPositiveNumber(usdPerJOD)) return (v / usdPerJOD) + fee;
      if (isPositiveNumber(fxRatePerUSD)) return (v * fxRatePerUSD) + fee;
      if (isPositiveNumber(fxRatePerJOD) && isPositiveNumber(usdPerJOD)) {
        const jod = v / usdPerJOD;
        return (jod * fxRatePerJOD) + fee;
      }
      return null;
    }
