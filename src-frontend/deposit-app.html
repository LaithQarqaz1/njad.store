      let fetchedUsdPerJOD = null;
      try{
        const activeCountryId = String((currentCountry && currentCountry.id) || m?.data?.countryId || '').trim();
        const fx = await fetchFx(activeCountryId, m.id, m?.data || {});
        fxCurrency   = fx.currencyCode;
        fxRatePerJOD = toPositiveOrNull(fx.ratePerJOD);   // 1 JOD -> CUR
        fxRatePerUSD = toPositiveOrNull(fx.ratePerUSD);   // 1 USD -> CUR
        fetchedUsdPerJOD = toPositiveOrNull(fx.usdPerJOD);
        fxFeeFixed = Number.isFinite(Number(fx.feeFixed)) && Number(fx.feeFixed) > 0 ? Number(fx.feeFixed) : 0;
        try {
          if (Array.isArray(fx.transferTargets) && fx.transferTargets.length) m.data.transferTargets = fx.transferTargets;
          if (Array.isArray(fx.displayFields) && fx.displayFields.length) m.data.displayFields = fx.displayFields;
          if (Array.isArray(fx.extraFields)) m.data.extraFields = fx.extraFields;
          if (Number.isFinite(Number(fx.feeFixed))) m.data.feeFixed = Number(fx.feeFixed);
        } catch(_){ }
        const curCode = (fxCurrency || '').toUpperCase();
        if (curCode === 'JOD') {
          fxRatePerJOD = 1;
        }
        if (curCode === 'USD') {
          fxRatePerUSD = 1;
        }
      }catch(e){
        fxCurrency = null; fxRatePerJOD = null; fxRatePerUSD = null; usdPerJOD = null; fxFeeFixed = 0;
        rateLine.textContent = 'فشل جلب السعر من الخادم';
        fxBadge.classList.add('hidden');
        sendJOD.value = ''; recvCUR.value='';
        renderMethodInfo(m);
        renderDynamicExtraFields(m);
        updateSubmitState();
        openModal();
        hidePreloader();
        return;
      }

      // عناوين الحقول واتجاه العملية: يدفع بعملة الطريقة → يُضاف بالدولار
      const payCurrency = String(fxCurrency || 'USD').toUpperCase();
      document.querySelector('label[for="sendJOD"]').textContent = `سيدفع (${payCurrency})`;
      document.querySelector('label[for="recvCUR"]').textContent = 'سيُضاف (USD)';

      // تحديد قيمة USD لكل 1 JOD: إن كانت الطريقة USD نستخدم نفس السعر،
      // وإلا نحاول البحث عن طريقة أخرى في نفس الدولة عملتها USD لاستخراج السعر منها.
      try {
        usdPerJOD = isPositiveNumber(fetchedUsdPerJOD) ? fetchedUsdPerJOD : null;
        const curCode = (fxCurrency || '').toUpperCase();
        if (!isPositiveNumber(usdPerJOD) && curCode === 'USD' && isPositiveNumber(fxRatePerJOD)) {
          usdPerJOD = fxRatePerJOD;
        }
        if (!isPositiveNumber(usdPerJOD) && curCode === 'JOD' && isPositiveNumber(fxRatePerUSD)) {
          usdPerJOD = 1 / fxRatePerUSD;
        }
        if (!isPositiveNumber(usdPerJOD)) {
          const usdMethod = (methods || []).find(x => {
            const c = (x && x.data && (x.data.currencyCode || x.data.currency || '')).toUpperCase();
            return c === 'USD';
          });
          if (usdMethod && usdMethod.data) {
            let r = toPositiveOrNull(usdMethod.data.usdPerJOD);
            if (!isPositiveNumber(r)) {
              r = toPositiveOrNull(usdMethod.data.ratePerJOD);
            }
            if (!isPositiveNumber(r)) {
              const toJOD = toPositiveOrNull(usdMethod.data.rateToJOD);
              if (isPositiveNumber(toJOD)) r = 1 / toJOD;
            }
            if (isPositiveNumber(r)) usdPerJOD = r;
          }
        }
        // ملاذ أخير: من وثيقة config/currency العامة
        if (!isPositiveNumber(usdPerJOD)){
          const fromCfg = await fetchUsdPerJODFromConfig();
          if (Number.isFinite(fromCfg) && fromCfg>0) usdPerJOD = fromCfg;
        }
      } catch(_){ }
      reconcileFxNumbers();
      // إن كان المستخدم كتب قيمة قبل اكتمال جلب usdPerJOD حدث الحقول الآن
      try{ if (sendJOD.value) sendJOD.oninput(); }catch(_){ }
      // تهيئة مبدئية: تركيز على خانة الدفع بالعملة الأساسية (دولار)
      try { sendJOD.focus(); } catch(_){ }
      let priceText = 'سعر الصرف غير متوفر';
      try{
        const CUR = (fxCurrency||'').toUpperCase();
        if (!CUR) {
          priceText = 'سعر الصرف غير متوفر';
        } else if (CUR === 'USD') {
          priceText = `1 USD = ${format4(1)} USD`;
        } else if (CUR === 'JOD' && isPositiveNumber(usdPerJOD)) {
          priceText = `1 JOD = ${format4(usdPerJOD)} USD`;
        } else if (isPositiveNumber(fxRatePerUSD)) {
          priceText = `1 ${CUR} = ${format4(1 / fxRatePerUSD)} USD`;
        } else if (isPositiveNumber(fxRatePerJOD) && isPositiveNumber(usdPerJOD)) {
          const usdPerCur = usdPerJOD / fxRatePerJOD;
          priceText = `1 ${CUR} = ${format4(usdPerCur)} USD`;
        } else if (isPositiveNumber(fxRatePerJOD)) {
          priceText = `1 ${CUR} = ${format4(1 / fxRatePerJOD)} JOD`;
        } else if (isPositiveNumber(usdPerJOD)) {
          priceText = `1 JOD = ${format4(usdPerJOD)} USD`;
        }
      }catch(_){ }
      if (Number.isFinite(Number(fxFeeFixed)) && Number(fxFeeFixed) > 0 && fxCurrency) {
        priceText += ` • عمولة ثابتة: ${Number(fxFeeFixed).toFixed(2)} ${fxCurrency}`;
      }
      fxText.textContent  = priceText;
      rateLine.textContent= priceText;
      fxBadge.classList.remove('hidden');
      renderMethodInfo(m);
      renderDynamicExtraFields(m);
      loadDepositHintFromSiteState().catch(()=>{});

      // الحاسبة (عرض فقط) — نعرض المبلغ الذي سيُضاف بالدولار USD
      sendJOD.oninput = ()=>{
        const v = Number(sendJOD.value);
        const usdAmount = computeUsdFromCur(v);
        if (!isPositiveNumber(usdAmount)) {
          recvCUR.value = '';
        } else {
          recvCUR.value = usdAmount.toFixed(2);
        }
        updateSubmitState();
        try{
          document.getElementById('fieldPay').classList.toggle('filled', isFinite(v) && v>0);
          const rv = Number(recvCUR.value);
          document.getElementById('fieldRecv').classList.toggle('filled', isFinite(rv) && rv>0);
        }catch(_){ }
      };
      recvCUR.oninput = ()=>{
        const v = Number(recvCUR.value);
        const curAmount = computeCurFromUsd(v);
        if (!isPositiveNumber(curAmount)) {
          sendJOD.value = '';
        } else {
          sendJOD.value = curAmount.toFixed(2);
        }
        updateSubmitState();
        try{
          document.getElementById('fieldRecv').classList.toggle('filled', isFinite(v) && v>0);
          const pv = Number(sendJOD.value);
          document.getElementById('fieldPay').classList.toggle('filled', isFinite(pv) && pv>0);
        }catch(_){ }
      };

      updateSubmitState();
      openModal();
      hidePreloader();
    }

    function amountsValid(){
      const pay = Number(sendJOD.value);
      const usd = computeUsdFromCur(pay);
      return Number.isFinite(pay) && pay > 0 && isPositiveNumber(usd);
    }

    /* ========================= اختيار ملف + رفع تلقائي (بدون تسجيل) ========================= */
    const proofFileEl = document.getElementById('proofFile');

    let proofUploadPending = false;

    function updateProofUI(){
      try{
        if (!proofTrigger) return;
        if (proofUploadPending){
          proofTrigger.classList.add('loading');
          proofTrigger.classList.remove('success');
          proofTrigger.innerHTML = '<span class="spinner" aria-hidden="true"></span><span>جاري الرفع...</span>';
        } else if (uploadedProofUrl){
          proofTrigger.classList.add('success');
          proofTrigger.classList.remove('loading');
          proofTrigger.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else {
          proofTrigger.classList.remove('loading');
          proofTrigger.classList.remove('success');
          proofTrigger.innerHTML = 'اثبات الدفع <i class="fa-solid fa-paperclip"></i>';
        }
      }catch(_){ }
    }

    if (proofFileEl) proofFileEl.addEventListener('change', ()=>{
      currentProofFile = proofFileEl.files && proofFileEl.files[0] ? proofFileEl.files[0] : null;
      uploadedProofUrl = null;
      if (!currentProofFile) {
        proofPreview.textContent = '';
        updateProofUI();
        updateSubmitState();
        return;
      }
      if (!String(currentProofFile.type || '').toLowerCase().startsWith('image/')) {
        currentProofFile = null;
        if (proofFileEl) proofFileEl.value = '';
        proofPreview.textContent = 'اختر ملف صورة صالحًا فقط.';
        updateProofUI();
        updateSubmitState();
        return;
      }
      if (Number(currentProofFile.size || 0) > 15 * 1024 * 1024) {
        currentProofFile = null;
        if (proofFileEl) proofFileEl.value = '';
        proofPreview.textContent = 'الحجم الأقصى للصورة 15MB.';
        updateProofUI();
        updateSubmitState();
        return;
      }
      if (!currentCountry || !currentMethod) {
        proofPreview.textContent = 'اختر الدولة والطريقة قبل رفع الإثبات.';
        updateProofUI();
        updateSubmitState();
        return;
      }
      const pickedProofFile = currentProofFile;
      proofPreview.textContent = 'جاري تجهيز الصورة…';
      updateProofUI();
      updateSubmitState();
      compressProofImage(pickedProofFile).then((prepared) => {
        if (currentProofFile !== pickedProofFile) return;
        currentProofFile = prepared;
        if (!proofUploadPending) {
          triggerProofUpload().catch(console.error);
        }
      }).catch((err) => {
        if (currentProofFile !== pickedProofFile) return;
        currentProofFile = null;
        if (proofFileEl) proofFileEl.value = '';
        proofPreview.textContent = (err && err.message) ? err.message : 'تعذر تجهيز الصورة.';
        updateProofUI();
        updateSubmitState();
      });
    });

    // الهدف ≤2.5MB: يبقي base64 فحص الذكاء الاصطناعي تحت ~4MB وبعيدًا عن حد تيليجرام 10MB.
    const PROOF_TARGET_BYTES = 2.5 * 1024 * 1024;
    const PROOF_MAX_DIMENSION = 2560;

    function canvasToBlob(canvas, type, quality){
      return new Promise((resolve) => {
        try { canvas.toBlob(resolve, type, quality); } catch (_) { resolve(null); }
      });
    }

    async function decodeProofImage(file){
      if (typeof createImageBitmap === 'function') {
        try {
          return await createImageBitmap(file, { imageOrientation: 'from-image' });
        } catch (_) {}
        try {
          return await createImageBitmap(file);
        } catch (_) {}
      }
      return await new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('تعذر قراءة الصورة — أرسل لقطة شاشة أو صورة JPG/PNG.'));
        };
        img.src = url;
      });
    }

    async function compressProofImage(file){
      const type = String(file.type || '').toLowerCase();
      if ((type === 'image/jpeg' || type === 'image/png') && Number(file.size || 0) <= PROOF_TARGET_BYTES) {
        return file;
      }
      const probeCanvas = document.createElement('canvas');
      if (typeof probeCanvas.toBlob !== 'function') {
        if (Number(file.size || 0) <= 9 * 1024 * 1024) return file;
        throw new Error('متصفحك لا يدعم ضغط الصور — اختر صورة أصغر من 9MB.');
      }
      const source = await decodeProofImage(file);
      try {
        const srcW = Number(source.width || source.naturalWidth || 0);
        const srcH = Number(source.height || source.naturalHeight || 0);
        if (!srcW || !srcH) throw new Error('تعذر قراءة الصورة — أرسل لقطة شاشة أو صورة JPG/PNG.');
        let scale = Math.min(1, PROOF_MAX_DIMENSION / Math.max(srcW, srcH));
        for (let round = 0; round < 3; round += 1) {
          const w = Math.max(1, Math.round(srcW * scale));
          const h = Math.max(1, Math.round(srcH * scale));
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          if (!ctx) break;
          ctx.drawImage(source, 0, 0, w, h);
          const qualities = [0.85, 0.75, 0.65, 0.55];
          for (let qi = 0; qi < qualities.length; qi += 1) {
            const blob = await canvasToBlob(canvas, 'image/jpeg', qualities[qi]);
            if (blob && blob.size > 0 && blob.size <= PROOF_TARGET_BYTES) {
              try { return new File([blob], 'proof.jpg', { type: 'image/jpeg' }); }
              catch (_) { return blob; }
            }
          }
          scale *= 0.75;
        }
      } finally {
        try { if (source && typeof source.close === 'function') source.close(); } catch (_) {}
      }
      throw new Error('تعذر ضغط الصورة — جرّب صورة أصغر أو لقطة شاشة.');
    }

    async function triggerProofUpload(){
      if (!currentProofFile) return;
      if (proofUploadPending) return;
      proofUploadPending = true;
      proofPreview.textContent = `جاري رفع: ${currentProofFile.name || 'proof.jpg'}`;
      updateProofUI();
      updateSubmitState();
      try {
        await autoUploadProof();
      } catch (err) {
        uploadedProofUrl = null;
        proofPreview.textContent = (err && err.message) ? err.message : 'فشل رفع الإثبات.';
        updateProofUI();
        throw err;
      } finally {
        proofUploadPending = false;
        updateProofUI();
        updateSubmitState();
      }
    }

    async function autoUploadProof(){
      if(!currentProofFile) throw new Error('اختر صورة أولاً.');
      if(!currentCountry || !currentCountry.id) throw new Error('اختر الدولة قبل رفع الإثبات.');
      if(!currentMethod || !currentMethod.id) throw new Error('اختر الطريقة قبل رفع الإثبات.');
      const idToken = await getIdTokenOrThrow();
      const fd = new FormData();
      fd.append('image', currentProofFile, currentProofFile.name || 'proof.jpg');
      fd.append('countryId', currentCountry.id);
      fd.append('countryName', currentCountry?.data?.name || '');
      fd.append('methodId', currentMethod.id);
      fd.append('methodName', currentMethod?.data?.name || '');
      const guardToken = generateGuardToken('edaa-upload');
      fd.append('guardToken', guardToken);
      fd.append('turnstileToken', guardToken);
      fd.append('cf-turnstile-response', guardToken);

      const res = await fetch(`${WORKER}/deposit/upload`, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + idToken
        },
        body: fd
      });
      let data = {};
      try { data = await res.json(); } catch(_){ data = {}; }
      if(!res.ok || !data?.success) throw new Error((data && (data.message || data.error)) || 'فشل رفع الإثبات');

      uploadedProofUrl =
        data.url ||
        data.display_url ||
        data.displayUrl ||
        (data.data ? (data.data.url || data.data.display_url) : null) ||
        null;
      if(!uploadedProofUrl) throw new Error('الخادم لم يرجع رابطًا صالحًا للملف.');

      proofPreview.innerHTML = `تم الرفع: <a href="${uploadedProofUrl}" target="_blank" rel="noopener">فتح الرابط</a>`;
      updateProofUI();
    }

    function updateSubmitState(){
      const okPay   = amountsValid();
      const okProof = !!uploadedProofUrl;
      const okMeta  = !!currentMethod && !!currentCountry;
      const okFields = collectDynamicExtraFields(currentMethod, true).ok;
      submitDepositBtn.disabled = !(okPay && okProof && okMeta && okFields);
    }

    /* ========================= تقديم طلب الإيداع — يتطلب تسجيل دخول ========================= */
    async function getIdTokenOrThrow(){
      const user = depositAuth && depositAuth.currentUser;
      if(!user) throw new Error('يجب تسجيل الدخول أولاً.');
      return await user.getIdToken(true);
    }

    function collectDynamicExtraFields(method, silent = false){
      const defs = getMethodExtraFields(method);
      if (!defs.length) {
        setDynamicExtraStatus('', '');
        return { ok: true, values: {} };
      }
      const out = {};
      let firstMissingControl = null;
      let firstMissingLabel = '';
      const controls = dynamicExtraFieldsGrid
        ? Array.from(dynamicExtraFieldsGrid.querySelectorAll('.dynamic-extra-control'))
        : [];
      defs.forEach((def, index) => {
        const key = String(def.key || `field_${index + 1}`).trim();
        const label = String(def.label || key).trim();
        const control = controls.find((entry) => String(entry?.dataset?.fieldKey || '') === key) || null;
        const value = String(
          control
            ? control.value
            : (currentExtraFieldValues[key] == null ? '' : currentExtraFieldValues[key])
        ).trim();
        const required = !!def.required;
        if (required && !value) {
          if (control) setDynamicFieldInvalid(control, true);
          if (!firstMissingControl) {
            firstMissingControl = control;
            firstMissingLabel = label;
          }
        } else if (control) {
          setDynamicFieldInvalid(control, false);
        }
        if (value) out[key] = value;
      });
      if (firstMissingLabel && !silent) {
        setDynamicExtraStatus(`أكمل الحقل المطلوب: ${firstMissingLabel}`);
        try {
          if (firstMissingControl) {
            firstMissingControl.focus();
            if (typeof firstMissingControl.scrollIntoView === 'function') {
              firstMissingControl.scrollIntoView({ behavior:'smooth', block:'center' });
            }
          }
        } catch(_){ }
        return { ok: false, values: {} };
      }
      setDynamicExtraStatus('', '');
      return { ok: !firstMissingLabel, values: out };
    }

    async function handleSubmitDeposit(country, method){
      if(!amountsValid()) return alert('أدخل المبلغ أولاً.');
      if(!uploadedProofUrl) return alert('من فضلك ارفع الإثبات أولاً.');
      try{
        const idToken = await getIdTokenOrThrow(); // الإرسال ما زال يتطلب تسجيل الدخول
        const guardToken = generateGuardToken('edaa-submit');
        const extraCollected = collectDynamicExtraFields(method);
        if (!extraCollected.ok) return;

        const payAmount = Number(sendJOD.value); // ما سيدفعه العميل بعملة الطريقة
        const body = {
          countryId: country?.id || "",
          countryName: country?.data?.name || country?.name || "",
          methodId: method?.id || "",
          methodName: method?.data?.name || method?.name || "",
          payAmount,                       // السيرفر يحسب الباقي
          proofUrl: uploadedProofUrl,
          extraFields: extraCollected.values,
          guardToken,
          turnstileToken: guardToken
        };

        const res = await fetch(`${WORKER}/deposit/submit`, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + idToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if(!res.ok || !data.success) throw new Error(data.error || 'فشل تقديم الطلب');
        try {
          window.dispatchEvent(new CustomEvent('njad:deposit-submitted', { detail: { depositCode: data.depositCode || '' } }));
        } catch(_){ }

        // احسب ما سيُضاف بالدولار
        let usdAdded = null;
        if (data && typeof data.amountUSD === 'number') {
          usdAdded = Number(data.amountUSD);
        } else {
          try{
            if (usdPerJOD && Number.isFinite(Number(usdPerJOD))) {
              const calc = Number(data.amountJOD) * Number(usdPerJOD);
              if (Number.isFinite(calc)) usdAdded = calc;
            }
          }catch(_){ usdAdded = null; }
        }

        const usdLine = (usdAdded!=null && Number.isFinite(usdAdded)) ? `سيُضاف (دولار): ${usdAdded.toFixed(2)} USD` : '';
        const usdRateLine = (typeof data.usdPerJOD === 'number' && data.usdPerJOD>0)
          ? `\n(1 JOD = ${Number(data.usdPerJOD).toFixed(4)} USD)`
          : '';
        const fxLine = (typeof data.ratePerUSD === 'number' && data.ratePerUSD>0)
          ? `(السعر من الخادم: 1 USD = ${Number(data.ratePerUSD).toFixed(4)} ${data.currency})`
          : ((typeof data.ratePerJOD === 'number' && data.ratePerJOD>0)
              ? `(السعر من الخادم: 1 JOD = ${Number(data.ratePerJOD).toFixed(4)} ${data.currency})`
              : '');

        // عرض نافذة تأكيد عصرية — CSS يُجلب من الباك-إند المحمي
        try { await ensureConfirmCss(idToken); } catch(_){ }
        showDepositConfirm({
          code: data.depositCode,
          paid: `${data.amountCurrency} ${data.currency}`,
          addedUSD: (usdAdded!=null && Number.isFinite(usdAdded)) ? usdAdded.toFixed(2)+ ' USD' : '—',
          fx: (function(){
            if (typeof data.ratePerUSD === 'number' && data.ratePerUSD>0) return `1 USD = ${Number(data.ratePerUSD).toFixed(4)} ${data.currency}`;
            if (typeof data.ratePerJOD === 'number' && data.ratePerJOD>0) return `1 JOD = ${Number(data.ratePerJOD).toFixed(4)} ${data.currency}`;
            return '';
          })(),
          extra: (typeof data.usdPerJOD === 'number' && data.usdPerJOD>0) ? `1 JOD = ${Number(data.usdPerJOD).toFixed(4)} USD` : ''
        });
        try { closeModalFn(); } catch(_){ }
      }catch(err){
        console.error(err);
        alert(err.message || 'فشل تقديم الطلب');
      }
    }

    /* ========================= تشغيل ========================= */
    function openMethodBound(m){
      submitDepositBtn.onclick = ()=>handleSubmitDeposit(currentCountry, m);
      openMethod(m);
    }

    function renderMethods(list){
      clearGrid();
      list.forEach(m=>{
        const a=document.createElement('a');
        a.href='javascript:void(0)';
        a.className='card';
        a.dataset.title=m.data.name||'';
        a.innerHTML=`
          <img src="${m.data.logoUrl||''}" alt="${m.data.name||''}">
          <h2>${m.data.name||''}</h2>`;
        a.addEventListener('click',()=>openMethodBound(m));
        grid.appendChild(a);
      });
      showNoResults(list.length===0);
    }

    if (closeModal) closeModal.addEventListener('click', closeModalFn);
    if (methodModal) methodModal.addEventListener('click', (e)=>{ if(e.target===methodModal) closeModalFn(); });

    // إعادة تحميل دول الإيداع عند العودة للمسار (طلب واحد جديد + كاش جديد)
    window.__depositInlineRefreshCountries = async function(){
      debugCountriesLog('info', 'Manual refresh requested');
      setCountriesRetryButtonVisible(false, '');
      try {
        clearDepositCountriesCache();
        depositFxCache.clear();
        countriesLoadedFromWorker = false;
        const freshCountries = await loadCountriesFromAvailableWorkers({
          forceRefresh: true,
          preferCache: false
        });
        countries = Array.isArray(freshCountries) ? freshCountries : [];
        countriesLoadedFromWorker = true;
        hydrateFxCacheFromCountries(countries);
        debugCountriesLog('info', 'Manual refresh completed', { count: countries.length });
        try { applyRoute(true); } catch(_){ }
        try { applySearch(); } catch(_){ }
        if (!currentCountry) setCountriesRetryButtonVisible(countries.length === 0, countries.length ? '' : 'manual_refresh_empty');
        return countries.length > 0;
      } catch (err) {
        countriesLoadDebugState.lastError = (err && err.message) ? err.message : String(err || 'manual_refresh_failed');
        debugCountriesLog('error', 'Manual refresh failed', { error: countriesLoadDebugState.lastError });
        setCountriesRetryButtonVisible(true, countriesLoadDebugState.lastError);
        console.warn('deposit refresh countries failed', err);
        return false;
      }
    };
    window.__depositInlineRetryCountries = async function(){
      debugCountriesLog('info', 'Retry countries helper called');
      return window.__depositInlineRefreshCountries();
    };

    // طبّق المسار الحالي (إن وُجد) ثم ابدأ مراقبة الدول
    try { applyRoute(true); } catch(_){}
    watchCountries();

    (function(){
      try {
        if(localStorage.getItem('theme') === 'dark'){
          document.body.classList.add('dark-mode');
        }
      }catch(e){}
    })();
  </script>
  
</body>
